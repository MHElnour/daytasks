name: Feature request
description: Suggest an idea or improvement for DayTasks
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What's missing or frustrating today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like DayTasks to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: >
        DayTasks is intentionally focused on the daily-note task workflow.
        API, sync, browser-extension, and mobile features are out of scope.
      options:
        - label: This request fits DayTasks' day-first, daily-note focus.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
