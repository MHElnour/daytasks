name: Bug report
description: Report a problem with DayTasks
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details
        below so it can be reproduced and fixed quickly.
  - type: input
    id: plugin-version
    attributes:
      label: DayTasks version
      description: Settings → Community plugins → DayTasks, or `manifest.json`.
      placeholder: e.g. 0.8.2
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      description: Obsidian → Settings → About.
      placeholder: e.g. 1.8.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15, Windows 11, Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a daily note named YYYY-MM-DD
        2. Create a task with ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (optional but very helpful)
      description: >
        Open the developer console (Ctrl/Cmd+Shift+I → Console tab), reproduce
        the bug, and paste any DayTasks errors here.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I'm using the latest DayTasks release.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
